syntax = "proto3";

package agentgateway.dev.resource;

import "google/protobuf/duration.proto";
import "google/protobuf/struct.proto";
import "workload.proto";

option go_package = "github.com/agentgateway/agentgateway/go/api;api";

message Resource {
  oneof kind {
    Bind bind = 1;
    Listener listener = 2;
    Route route = 3;
    Backend backend = 4;
    Policy policy = 5;
    TCPRoute tcp_route = 6;
    istio.workload.Workload workload = 7;
    // Service represents a service - a group of workloads that can be accessed together.
    istio.workload.Service service = 8;
    RouteGroup route_group = 9;
  }
}

message Bind {
  // Protocol defines the bind-level protocol to use. Individual listeners will have more details about this.
  // For instance, a Bind protocol TLS may have TLS termination and TLS passthrough listeners.
  // However, it indicates we need to process TLS
  enum Protocol {
    HTTP = 0;
    TCP = 1;
    TLS = 2;
  }
  // TunnelProtocol defines the tunnel protocol to use. This will wrap outside of the Protocol.
  enum TunnelProtocol {
    DIRECT = 0;
    PROXY = 1;
    HBONE_WAYPOINT = 2;
    HBONE_GATEWAY = 3;
    CONNECT = 4;
  }
  // Mode controls whether the bind opens an OS listener socket.
  enum Mode {
    // Open a listener socket on the bind's port (the normal behavior).
    STANDARD = 0;
    // Do not open a socket. The bind is routing-only and reachable via in-process re-entry
    // (e.g. another listener redirecting CONNECT traffic to it). A port of 0 designates the
    // wildcard fallback that serves any destination port.
    INTERNAL = 1;
  }
  string key = 1;
  uint32 port = 2;
  Protocol protocol = 3;
  TunnelProtocol tunnel_protocol = 4;
  Mode mode = 5;
}

message RouteName {
  string kind = 1;
  string name = 2;
  string namespace = 3;
  optional string rule_name = 4;
}

message ListenerName {
  string gateway_name = 1;
  string gateway_namespace = 2;
  string listener_name = 3;
  // If the listener is derive from a listenerset, the metadata of the listenerset
  ResourceName listener_set = 4;
}

message ResourceName {
  string name = 1;
  string namespace = 2;
}

message TypedResourceName {
  string name = 1;
  string namespace = 2;
  string kind = 3;
}

message Listener {
  // Unique key for this listener
  string key = 1;
  // Key for the bind this is a part of.
  string bind_key = 2;
  // User facing name for this resource
  ListenerName name = 3;

  string hostname = 4;
  Protocol protocol = 5;
  TLSConfig tls = 6;
}

message Route {
  // Unique key for this route
  string key = 1;

  // Parent key. Must be one of listener or route group
  // Key for the listener this is a part of.
  string listener_key = 2;
  // Service this route targets (set when parentRef is a Service).
  istio.workload.NamespacedHostname service_key = 9;
  // Port of the targeted service this route is scoped to. Zero matches any port.
  uint32 service_port = 11;
  // Key for the route group this route is a part of.
  optional string route_group_key = 10;

  // User facing name for this resource
  RouteName name = 3;

  repeated string hostnames = 5;
  repeated RouteMatch matches = 6;
  repeated RouteBackend backends = 7;
  repeated TrafficPolicySpec traffic_policies = 8;
}

message RouteGroup {
  string key = 1;
  string namespace = 2;
  string name = 3;
}

message TCPRoute {
  // Unique key for this route
  string key = 1;
  // Key for the listener this is a part of.
  string listener_key = 2;
  // Service this route targets (set when parentRef is a Service).
  istio.workload.NamespacedHostname service_key = 9;
  // Port of the targeted service this route is scoped to. Zero matches any port.
  uint32 service_port = 11;
  // User facing name for this resource
  RouteName name = 3;

  repeated string hostnames = 5;
  repeated RouteBackend backends = 6;
}

message ConditionalPolicies {
    repeated ConditionalPolicy policies = 1;
}
message ConditionalPolicy {
  optional string condition = 1;
  oneof kind {
    // Currently only traffic is supported
    TrafficPolicySpec traffic = 2;
//    BackendPolicySpec backend = 3;
//    FrontendPolicySpec frontend = 4;
  }
}
message Policy {
  enum Inheritance {
    DEFAULT = 0;
    OVERRIDE = 1;
  }

  // Unique key for this policy
  string key = 1;
  // User facing name for this resource
  TypedResourceName name = 2;
  PolicyTarget target = 3;
  // Controls whether more-specific child policy levels can be included when
  // computing the effective policy.
  Inheritance inheritance = 8;

  oneof kind {
    TrafficPolicySpec traffic = 4;
    BackendPolicySpec backend = 5;
    FrontendPolicySpec frontend = 6;
    ConditionalPolicies conditional = 7;
  }
}
message Backend {
  // Unique key for this policy
  string key = 1;
  // User facing name for this resource
  ResourceName name = 2;
  oneof kind {
    StaticBackend static = 3;
    AIBackend ai = 4;
    MCPBackend mcp = 5;
    DynamicForwardProxy dynamic = 6;
    AwsBackend aws = 8;
    // Not yet implemented. Reserved for a future release.
    GuardrailBackend guardrail = 9;
  }
  repeated BackendPolicySpec inline_policies = 7;
}

// GuardrailBackend is a typed backend for AI guardrail provider integrations.
// The gateway owns the transport (endpoint host, TLS, protocol, implicit auth);
// the user supplies only the instance-specific configuration for the provider.
// Guardrail backends are referenced from prompt guard policies via backend_ref;
// they are not intended to be used as route targets.
message GuardrailBackend {
  // AWS Bedrock Guardrails (ApplyGuardrail API)
  message Bedrock {
    // The unique identifier of the guardrail
    string identifier = 1;
    // The version of the guardrail
    string version = 2;
    // AWS region where the guardrail is deployed (e.g., "us-west-2").
    // Used to construct the endpoint host.
    string region = 3;
  }
  // Google Cloud Model Armor (sanitizeUserPrompt/sanitizeModelResponse APIs)
  message GoogleModelArmor {
    // The template ID for the Model Armor configuration
    string template_id = 1;
    // The GCP project ID
    string project_id = 2;
    // The GCP region, used to construct the endpoint host (default: us-central1)
    optional string location = 3;
  }
  // Azure AI Content Safety (text:analyze/text:detectJailbreak APIs)
  message AzureContentSafety {
    // The Azure resource name used to construct the endpoint host
    // (<resource_name>.cognitiveservices.azure.com).
    // Exactly one of resource_name and endpoint must be set.
    optional string resource_name = 1;
    // The full endpoint host or URL (e.g., "https://<resource-name>.cognitiveservices.azure.com"),
    // for endpoints whose host cannot be derived from the resource name.
    optional string endpoint = 2;
  }
  // OpenAI moderations API (api.openai.com/v1/moderations)
  message OpenAIModeration {}
  oneof provider {
    Bedrock bedrock = 1;
    GoogleModelArmor google_model_armor = 2;
    AzureContentSafety azure_content_safety = 3;
    OpenAIModeration openai_moderation = 4;
  }
}

message TLSConfig {
  enum CertificateSource {
    INLINE = 0;
    ISTIO_WORKLOAD = 1;
    DYNAMIC_CA = 2;
  }

  enum TLSVersion {
    TLS_VERSION_UNSPECIFIED = 0;

    // TLS 1.0/1.1 are not currently supported
    // Keep the old number/name reserved for future support
    reserved "TLS_V1_0";
    reserved 1;
    reserved "TLS_V1_1";
    reserved 2;
    TLS_V1_2 = 3;
    TLS_V1_3 = 4;
  }

  enum MTLSMode {
    STRICT = 0;

    // Request a TLS certificate, but if one is not presented or invalid, allow the connection.
    ALLOW_INSECURE_FALLBACK = 1;

    // Do not request or require a client TLS certificate.
    DISABLE = 2;
  }

  // Cipher suites supported by agentgateway
  // Keep in sync with `crates/agentgateway/src/transport/tls.rs` (`ALL_CIPHER_SUITES`).
  enum CipherSuite {
    CIPHER_SUITE_UNSPECIFIED = 0;

    // TLS 1.3 cipher suites
    TLS_AES_256_GCM_SHA384 = 1;
    TLS_AES_128_GCM_SHA256 = 2;
    TLS_CHACHA20_POLY1305_SHA256 = 3;

    // TLS 1.2 cipher suites
    TLS_ECDHE_ECDSA_WITH_AES_256_GCM_SHA384 = 4;
    TLS_ECDHE_ECDSA_WITH_AES_128_GCM_SHA256 = 5;
    TLS_ECDHE_ECDSA_WITH_CHACHA20_POLY1305_SHA256 = 6;
    TLS_ECDHE_RSA_WITH_AES_256_GCM_SHA384 = 7;
    TLS_ECDHE_RSA_WITH_AES_128_GCM_SHA256 = 8;
    TLS_ECDHE_RSA_WITH_CHACHA20_POLY1305_SHA256 = 9;
  }

  // Key exchange groups supported by agentgateway.
  // Keep in sync with `crates/agentgateway/src/transport/tls.rs` (`DEFAULT_KEY_EXCHANGE_GROUPS`).
  enum KeyExchangeGroup {
    KEY_EXCHANGE_GROUP_UNSPECIFIED = 0;
    X25519 = 1;
    P256 = 2;
    P384 = 3;
    X25519_MLKEM768 = 4;
  }

  bytes cert = 1;
  bytes private_key = 2;
  // Root to verify client certificates. If not set, mTLS will not be used
  optional bytes root = 3;
  repeated CipherSuite cipher_suites = 4;
  optional TLSVersion min_version = 5;
  optional TLSVersion max_version = 6;
  MTLSMode mtls_mode = 7;
  // Key exchange groups allowed for negotiating TLS.
  // If empty, defaults are used.
  repeated KeyExchangeGroup key_exchange_groups = 8;
  CertificateSource certificate_source = 9;
}

enum Protocol {
  UNKNOWN = 0;
  HTTP = 1;
  HTTPS = 2;
  TLS = 3;
  TCP = 4;
  HBONE = 5;
}

message Timeout {
  google.protobuf.Duration request = 1;
  google.protobuf.Duration backend_request = 2;
}

message Retry {
  repeated int32 retry_status_codes = 1;
  int32 attempts = 2;
  google.protobuf.Duration backoff = 3;
  // CEL expression evaluated against the request before any attempt. When it evaluates
  // to false, retries are disabled (only the initial attempt is made). This avoids
  // buffering request bodies for replay when the request is known to be non-retriable.
  string precondition = 4;
  // CEL expression evaluated against each response. A response is retried when its status
  // code is in retry_status_codes or this expression evaluates to true.
  string condition = 5;
}

message BackendAuthPolicy {
  oneof kind {
    Passthrough passthrough = 1;
    Key key = 2;
    Gcp gcp = 3;
    Aws aws = 4;
    Azure azure = 5;
    OAuthTokenExchange oauth_token_exchange = 6;
  }
}

message AuthorizationLocation {
  message Header {
    string name = 1;
    optional string prefix = 2;
  }

  message QueryParameter {
    string name = 1;
  }

  message Cookie {
    string name = 1;
  }

  oneof kind {
    Header header = 1;
    QueryParameter query_parameter = 2;
    Cookie cookie = 3;
    string expression = 4; // CEL expression
  }
}

message Passthrough {
  AuthorizationLocation authorization_location = 1;
}

// Contains a secret for authentication, e.g. an API key.
message Key {
  string secret = 1;
  AuthorizationLocation authorization_location = 2;
}

// GCP-specific backend authentication.
message Gcp {
  message AccessToken {}

  message IdToken {
    // Optional; else will use the backend hostname
    optional string audience = 1;
  }

  // ADC-compatible Google credential JSON. If unset, ambient credentials are used.
  optional string credential = 3;

  oneof token_type {
    // Default if unset
    AccessToken access_token = 1;
    IdToken id_token = 2;
  }
}

// AWS-specific backend authentication.
message Aws {
  oneof kind {
    AwsExplicitConfig explicit_config = 1;
    AwsImplicit implicit = 2;
  }
  // AWS SigV4 signing service name (for example, "bedrock", "bedrock-agentcore", or "execute-api").
  // If unset, typed AWS backends may provide this automatically.
  string service_name = 3;
  // Optional STS role to assume before signing requests.
  AwsAssumeRole assume_role = 4;
}

// Azure-specific backend authentication.
message Azure {
  oneof kind {
    AzureExplicitConfig explicit_config = 1;
    AzureDeveloperImplicit developer_implicit = 2;
    AzureImplicit implicit = 3;
  }
}

// Explicit AWS credentials configuration
message AwsExplicitConfig {
  // AWS Access Key ID for authentication
  string access_key_id = 1;
  // AWS Secret Access Key for authentication
  string secret_access_key = 2;
  // AWS Region (e.g., "us-west-2", "us-east-1"). Optional for AWS backends.
  string region = 3;
  // Optional session token for temporary credentials
  optional string session_token = 4;
}

// Use implicit AWS authentication (environment variables, IAM roles, etc.)
message AwsImplicit {}

// AWS STS AssumeRole configuration.
message AwsAssumeRole {
  // Role ARN to assume before signing backend requests.
  string role_arn = 1;
}

// Explicit Azure credentials configuration
message AzureExplicitConfig {
  oneof credential_source {
    AzureClientSecret client_secret = 1;
    AzureManagedIdentityCredential managed_identity_credential = 2;
    AzureWorkloadIdentityCredential workload_identity_credential = 3;
  }
}

// Azure Client Secret authentication method
message AzureClientSecret {
  // Azure tenant ID
  string tenant_id = 1;
  // Azure client ID (application ID)
  string client_id = 2;
  // Azure client secret
  string client_secret = 3;
}

// Azure Managed Identity authentication method
message AzureManagedIdentityCredential {
  message UserAssignedIdentity {
    oneof id {
      string client_id = 1;
      string object_id = 2;
      string resource_id = 3;
    }
  }
  // The UAMI to be used to authenticate. If not set, the system-assigned identity will be used.
  optional UserAssignedIdentity user_assigned_identity = 1;
}

// Azure Workload Identity authentication method
message AzureWorkloadIdentityCredential {}

// Use implicit Azure authentication for developer use-cases only
message AzureDeveloperImplicit {}

// Automatically detect authentication method based on environment.
// Uses Workload Identity on K8s, Managed Identity on Azure VMs, or Developer Tools locally.
message AzureImplicit {}

message RouteMatch {
  PathMatch path = 1;
  repeated HeaderMatch headers = 2;
  MethodMatch method = 3;
  repeated QueryMatch query_params = 4;
}

message PathMatch {
  oneof kind {
    string exact = 1;
    string path_prefix = 2;
    string regex = 3;
  }
}

message QueryMatch {
  string name = 1;
  oneof value {
    string exact = 2;
    string regex = 3;
  }
}

message MethodMatch {
  string exact = 1;
}

message HeaderMatch {
  string name = 1;

  oneof value {
    string exact = 2;
    string regex = 3;
  }
}

message CORS {
  bool allow_credentials = 1;
  repeated string allow_headers = 2;
  repeated string allow_methods = 3;
  repeated string allow_origins = 4;
  repeated string expose_headers = 5;
  // max_age is in seconds, use google.protobuf.Duration if available, otherwise uint64 for seconds
  google.protobuf.Duration max_age = 6;
}

message DirectResponse {
  uint32 status = 1;
  bytes body = 2;
  string body_expression = 3;
  repeated ExpressionHeader headers = 4;
}

message ExpressionHeader {
  string name = 1;
  string expression = 2;
}

message HeaderModifier {
  repeated Header add = 1;
  repeated Header set = 2;
  repeated string remove = 3;
}

message RequestMirrors {
  message Mirror {
    BackendReference backend = 1;
    // 0-100
    double percentage = 2;
  }
  repeated Mirror mirrors = 1;
}

message RequestRedirect {
  string scheme = 1;
  string host = 2;
  oneof path {
    string full = 3;
    string prefix = 4;
  }
  uint32 port = 5;
  uint32 status = 6;
}

message UrlRewrite {
  string host = 1;
  oneof path {
    string full = 2;
    string prefix = 3;
  }
}

message Header {
  string name = 1;
  string value = 2;
}

message RouteBackend {
  BackendReference backend = 1;
  optional string route_group_key = 6;
  int32 weight = 2;
  // Reserved tag number for removed field: filters(4)
  reserved 4;
  repeated BackendPolicySpec backend_policies = 5;
}

message PolicyTarget {
  message ServiceTarget {
    string namespace = 1;
    string hostname = 2;
    optional uint32 port = 3;
  }
  message BackendTarget {
    string name = 1;
    string namespace = 2;
    optional string section = 3;
  }
  message GatewayTarget {
    string name = 1;
    string namespace = 2;
    optional string listener = 3;
    optional uint32 port = 4;
  }
  message RouteTarget {
    string name = 1;
    string namespace = 2;
    optional string route_rule = 3;
    string kind = 4;
  }
  message ListenerSetTarget {
    string name = 1;
    string namespace = 2;
    optional string section = 3;
  }
  oneof kind {
    GatewayTarget gateway = 1;
    RouteTarget route = 2;
    BackendTarget backend = 3;
    ServiceTarget service = 4;
    ListenerSetTarget listener_set = 5;
  }
}

message KeepaliveConfig {
  // Time before sending keepalive probes
  google.protobuf.Duration time = 1;

  // Interval between keepalive probes
  google.protobuf.Duration interval = 2;

  // Number of keepalive retries before giving up
  optional uint32 retries = 3;
}

message FrontendPolicySpec {
  message HTTP {
    enum HTTPHeaderCase {
      LOWERCASE = 0;
      PRESERVE = 1;
    }

    optional uint32 max_buffer_size = 1;
    optional uint32 http1_max_headers = 2;
    google.protobuf.Duration http1_idle_timeout = 3;
    optional uint32 http2_window_size = 4;
    optional uint32 http2_connection_window_size = 5;
    optional uint32 http2_frame_size = 6;
    google.protobuf.Duration http2_keepalive_interval = 7;
    google.protobuf.Duration http2_keepalive_timeout = 8;
    google.protobuf.Duration max_connection_duration = 9;
    optional uint32 http2_max_header_size = 10;
    // Controls HTTP/1 request header casing when encoding responses.
    HTTPHeaderCase http1_header_case = 11;
  }
  message TLS {
    // TLS handshake timeout
    google.protobuf.Duration handshake_timeout = 1;

    // Unset: use defaults (h2,http/1.1)
    // Set but empty: send none
    // Set with values: send those values
    Alpn alpn = 2;

    // Cipher suites allowed for negotiating TLS.
    // If empty, defaults are used.
    repeated TLSConfig.CipherSuite cipher_suites = 3;

    // TLS version range allowed for negotiating TLS.
    // If unset, defaults are used.
    optional TLSConfig.TLSVersion min_version = 4;
    optional TLSConfig.TLSVersion max_version = 5;
    // Key exchange groups allowed for negotiating TLS.
    // If empty, defaults are used.
    repeated TLSConfig.KeyExchangeGroup key_exchange_groups = 6;

    // TODO: allow setting mTLS things as well
  }

  message TCP {
    // TCP keepalive configuration
    KeepaliveConfig keepalives = 1;
  }

  message NetworkAuthorization {
    repeated string allow = 1;
    repeated string deny = 2;
    repeated string require = 3;
  }
  // Logging configuration policy
  message Logging {
    // CEL expression to filter out logs. If unset, all logs are considered.
    optional string filter = 1;

    message Field {
      string name = 1;
      string expression = 2;
    }

    // Additional log fields configuration
    message Fields {
      // Field keys to remove from logs
      repeated string remove = 1;
      // Field keys to add with CEL expressions
      repeated Field add = 2;
    }

    // Fields applied to logs
    Fields fields = 2;

    // OTLP access log configuration for shipping access logs to an
    // OpenTelemetry-compatible backend.
    message OtlpAccessLog {
      // Backend to send OTLP access logs to.
      BackendReference provider_backend = 1;
      // Inline backend policies (e.g. TLS, auth) for the OTLP backend.
      repeated BackendPolicySpec inline_policies = 2;
      // OTLP protocol variant. Default is HTTP.
      Protocol protocol = 3;
      // OTLP/HTTP path. Only applicable when protocol is HTTP. Default is /v1/logs.
      optional string path = 4;

      enum Protocol {
        HTTP = 0;
        GRPC = 1;
      }
    }

    // Optional OTLP access log export configuration.
    OtlpAccessLog otlp_access_log = 3;
  }

  message Tracing {
    BackendReference provider_backend = 1;
    repeated TracingAttribute attributes = 2;
    repeated TracingAttribute resources = 3;

    // remove is a list of attribute keys to remove from emitted spans.
    // This is applied before `attributes` are evaluated/added, so it can drop defaults
    // or avoid duplicates.
    repeated string remove = 8;

    // random_sampling is a CEL expression to determine the amount of random sampling.
    // Random sampling will initiate a new trace span if the incoming request does not
    // have a trace initiated already. This should evaluate to a float between 0.0-1.0,
    // or a boolean (true/false). If unspecified, random sampling is disabled.
    optional string random_sampling = 4;

    // client_sampling is a CEL expression to determine the amount of client sampling.
    // Client sampling determines whether to initiate a new trace span if the incoming
    // request already has a trace. This should evaluate to a float between 0.0-1.0,
    // or a boolean (true/false). If unspecified, client sampling is 100% enabled.
    optional string client_sampling = 5;

    // OTLP/HTTP path. Only applicable when protocol is HTTP. Default is /v1/traces
    optional string path = 6;

    // protocol specifies the OTLP protocol variant to use. Default is HTTP
    Protocol protocol = 7;

    // CEL expression to filter exported spans with keep semantics. If unset, all sampled spans are exported.
    optional string filter = 9;

    enum Protocol {
      HTTP = 0;
      GRPC = 1;
    }
  }

  message TracingAttribute {
    string name = 1;
    string value = 2; // CEL expression
  }

  message ProxyProtocol {
    enum Version {
      V2 = 0;
      V1 = 1;
      ALL = 2;
    }

    enum Mode {
      STRICT = 0;
      OPTIONAL = 1;
    }

    Version version = 1;
    Mode mode = 2;
  }

  message Connect {
    enum Mode {
      DENY = 0;
      ROUTE = 1;
      TUNNEL = 2;
    }

    Mode mode = 1;
  }

  // Custom Prometheus metric label configuration policy.
  // CEL expressions are evaluated per-request and added as labels to all metrics.
  message Metrics {
    message Field {
      string name = 1;
      string expression = 2; // CEL expression
    }
    message Fields {
      repeated Field add = 1;
    }
    Fields fields = 1;
  }

  oneof kind {
    TCP tcp = 1;
    TLS tls = 2;
    HTTP http = 3;
    Logging logging = 4;
    Tracing tracing = 5;
    NetworkAuthorization network_authorization = 6;
    ProxyProtocol proxy_protocol = 7;
    Metrics metrics = 8;
    Connect connect = 9;
  }
}

// JWT validation options controlling which claims must be present in a token.
// Recognized values: "exp", "nbf", "aud", "iss", "sub".
// Claims present in the token are still validated even if not listed as required.
message JWTValidationOptions {
  // Claims that must be present in the token before validation.
  // Defaults to ["exp"]. Use an empty list to require no claims.
  repeated string required_claims = 1;
}

message TrafficPolicySpec {
  message RemoteRateLimit {
    string domain = 1;
    repeated Descriptor descriptors = 2;
    BackendReference target = 3;

    enum Type {
      REQUESTS = 0;
      TOKENS = 1;
    }
    // Defines how the proxy behaves when the remote rate limit service is
    // unavailable or returns an error. Defaults to FAIL_CLOSED
    enum FailureMode {
      FAIL_CLOSED = 0;
      FAIL_OPEN = 1;
    }
    message Descriptor {
      repeated Entry entries = 1;
      Type type = 2;
      optional string limit_override = 3; // CEL expr returning {unit, requestsPerUnit}
      optional string cost = 4; // CEL expr
    }
    message Entry {
      string key = 1;
      string value = 2; // CEL expr
    }
    FailureMode failure_mode = 4;
  }
  message LocalRateLimit {
    enum Type {
      REQUEST = 0;
      TOKEN = 1;
    }
    uint64 max_tokens = 1;
    uint64 tokens_per_fill = 2;
    google.protobuf.Duration fill_interval = 3;
    Type type = 4;
  }
  message ExternalAuth {
    enum FailureMode {
      DENY = 0;
      ALLOW = 1;
      DENY_WITH_STATUS = 2;
    }
    message BodyOptions {
      uint32 max_request_bytes = 1;
      bool allow_partial_message = 2;
      bool pack_as_bytes = 3;
    }
    message Cache {
      repeated string key = 1;
      string ttl = 2; // CEL expr returning duration or timestamp
      uint32 max_entries = 3;
    }
    message GRPCProtocol {
      map<string, string> context = 1;
      map<string, string> metadata = 2;
    }
    message HTTPProtocol {
      optional string path = 1;
      optional string redirect = 2;
      repeated string include_response_headers = 3;
      map<string, string> add_request_headers = 4;
      map<string, string> metadata = 5;
      optional string body = 6;
    }
    BackendReference target = 1;
    oneof protocol {
      GRPCProtocol grpc = 2;
      HTTPProtocol http = 3;
    }
    FailureMode failure_mode = 4;
    optional uint32 status_on_error = 5;
    repeated string include_request_headers = 6;
    BodyOptions include_request_body = 7;
    Cache cache = 8;
    reserved "timeout";
  }
  message RBAC {
    repeated string allow = 1;
    repeated string deny = 2;
    repeated string require = 3;
  }
  message JWTProvider {
    // JWT issuer that must match the 'iss' claim
    string issuer = 1;

    // List of audiences - the 'aud' claim must be in this list
    repeated string audiences = 2;

    // JWKS configuration - where to get the keys for validation
    oneof jwks_source {
      // Inline JWKS as a JSON string
      string inline = 3;
    }

    // JWT validation options controlling which claims must be present.
    JWTValidationOptions jwt_validation_options = 4;
  }
  // JWT authentication configuration
  message JWT {
    message MCP {
      BackendPolicySpec.McpAuthentication.McpIDP provider = 1;
      BackendPolicySpec.McpAuthentication.ResourceMetadata resource_metadata = 2;
      optional string client_id = 3;
    }

    // Validation mode for JWT authentication
    enum Mode {
      // Default mode - if a token exists, validate it
      OPTIONAL = 0;
      // A valid token must be present
      STRICT = 1;
      // Requests are never rejected (useful for claims in later steps)
      PERMISSIVE = 2;
    }

    // How the JWT validation should behave
    Mode mode = 1;
    repeated JWTProvider providers = 2;
    MCP mcp = 3;
    AuthorizationLocation authorization_location = 4;
  }

  // Basic authentication configuration using htpasswd file
  message BasicAuthentication {
    // Validation mode for basic authentication
    enum Mode {
      // Requires valid credentials
      STRICT = 0;
      // If credentials exist, validate them (default)
      OPTIONAL = 1;
    }

    // Htpasswd file content
    string htpasswd_content = 1;

    // Realm name for WWW-Authenticate header
    optional string realm = 2;

    // How the basic authentication should behave
    Mode mode = 3;

    AuthorizationLocation authorization_location = 4;
  }

  // API Key authentication
  message APIKey {
    // Validation mode for API Key authentication
    enum Mode {
      // Requires valid credentials
      STRICT = 0;
      // If credentials exist, validate them (default)
      OPTIONAL = 1;
      // Requests are never rejected for missing or invalid API keys
      PERMISSIVE = 2;
    }

    message User {
      string key = 1;
      google.protobuf.Struct metadata = 2;
      string key_hash = 3;
    }

    repeated User api_keys = 1;

    // How the API key authentication should behave
    Mode mode = 2;

    AuthorizationLocation authorization_location = 3;
  }

  message TransformationPolicy {
    message Transform {
      repeated HeaderTransformation set = 1;
      repeated HeaderTransformation add = 2;
      repeated string remove = 3;
      BodyTransformation body = 4;
      map<string, string> metadata = 5;
    }
    Transform request = 1;
    Transform response = 2;
  }

  message HeaderTransformation {
    string name = 1;
    string expression = 2;
  }

  message BodyTransformation {
    string expression = 1;
  }

  // Cross-Site Request Forgery (CSRF) policy configuration.
  message CSRF {
    // Additional origins that are allowed for CSRF validation beyond the same-origin policy.
    // If a request's origin header matches any of these exact origins, the request will be allowed.
    // Each origin should be in the format "scheme://host[:port]" (e.g., "https://www.example.com")
    repeated string additional_origins = 1;
  }

  message ExtProc {
    enum FailureMode {
      FAIL_CLOSED = 0;
      FAIL_OPEN = 1;
    }
    // TODO(keithmattix): Should we depend on the actual Envoy types?
    enum BodySendMode {
      NONE = 0;
      reserved 1; // STREAMED
      BUFFERED = 2;
      BUFFERED_PARTIAL = 3;
      FULL_DUPLEX_STREAMED = 4;
    }
    enum HeaderTrailerSendMode {
      UNSET = 0;
      SEND = 1;
      SKIP = 2;
    }
    BackendReference target = 1;
    FailureMode failure_mode = 2;

    map<string, string> request_attributes = 3;
    map<string, string> response_attributes = 4;

    message NamespacedMetadataContext {
      map<string, string> context = 1;
    }
    message ProcessingOptions {
      BodySendMode request_body_mode = 1;
      BodySendMode response_body_mode = 2;
      HeaderTrailerSendMode request_header_mode = 3;
      HeaderTrailerSendMode response_header_mode = 4;
      HeaderTrailerSendMode request_trailer_mode = 5;
      HeaderTrailerSendMode response_trailer_mode = 6;
      // Allow ext_proc mode_override values from matching headers responses to update
      // subsequent request/response processing phases for this exchange.
      bool allow_mode_override = 7;
    }
    map<string, NamespacedMetadataContext> metadata_context = 5;
    ProcessingOptions processing_options = 6;
  }
  enum PolicyPhase {
    ROUTE = 0;
    GATEWAY = 1;
  }

  message HostRewrite {
    enum Mode {
      NONE = 0;
      AUTO = 1;
    }
    Mode mode = 1;
  }

  PolicyPhase phase = 1;

  message Buffer {
    enum OverflowAction {
      RETURN_ERROR = 0;
      CONTINUE_STREAMING = 1;
    }

    message BufferBody {
      optional uint32 max_bytes = 1;
      OverflowAction on_overflow = 2;
    }

    optional BufferBody request = 1;
    optional BufferBody response = 2;
  }

  oneof kind {
    Timeout timeout = 2;
    Retry retry = 3;
    LocalRateLimit local_rate_limit = 4;
    ExternalAuth ext_authz = 5;
    RBAC authorization = 6;
    JWT jwt = 7;
    TransformationPolicy transformation = 8;
    RemoteRateLimit remote_rate_limit = 9;
    CSRF csrf = 10;
    ExtProc ext_proc = 11;
    HeaderModifier request_header_modifier = 12;
    HeaderModifier response_header_modifier = 13;
    RequestRedirect request_redirect = 14;
    UrlRewrite url_rewrite = 15;
    RequestMirrors request_mirror = 16;
    DirectResponse direct_response = 17;
    CORS cors = 18;
    BasicAuthentication basic_auth = 19;
    APIKey api_key_auth = 20;
    HostRewrite host_rewrite = 21;
    Buffer buffer = 22;
  }
}

message BackendPolicySpec {
  message Ai {
    message Message {
      string role = 1;
      string content = 2;
    }

    message PromptEnrichment {
      repeated Message append = 1;
      repeated Message prepend = 2;
    }

    enum BuiltinRegexRule {
      BUILTIN_UNSPECIFIED = 0;
      SSN = 1;
      CREDIT_CARD = 2;
      PHONE_NUMBER = 3;
      EMAIL = 4;
      CA_SIN = 5;
    }

    message RegexRule {
      oneof kind {
        BuiltinRegexRule builtin = 1;
        string regex = 2;
      }
    }

    enum ActionKind {
      ACTION_UNSPECIFIED = 0;
      MASK = 1;
      REJECT = 2;
    }

    message RegexRules {
      ActionKind action = 1;
      repeated RegexRule rules = 2;
    }

    message Webhook {
      BackendReference backend = 1;
      repeated HeaderMatch forward_header_matches = 3;

      // Behavior when the webhook guardrail is unavailable or returns an
      // error. Defaults to FAIL_CLOSED.
      enum FailureMode {
        FAIL_CLOSED = 0;
        FAIL_OPEN = 1;
      }
      FailureMode failure_mode = 4;
    }

    message Moderation {
      // Model to use. Defaults to `omni-moderation-latest`
      optional string model = 1;
      repeated BackendPolicySpec inline_policies = 2;
      // Not yet implemented. Reserved for a future release.
      BackendReference backend_ref = 3;
    }

    message BedrockGuardrails {
      string identifier = 1;
      string version = 2;
      // AWS region where the guardrail is deployed (e.g., "us-west-2")
      string region = 3;

      repeated BackendPolicySpec inline_policies = 4;

      // Not yet implemented. Reserved for a future release.
      BackendReference backend_ref = 5;
    }

    message GoogleModelArmor {
      string template_id = 1;
      string project_id = 2;

      // default: us-central1
      optional string location = 3;

      repeated BackendPolicySpec inline_policies = 4;

      // Not yet implemented. Reserved for a future release.
      BackendReference backend_ref = 5;
    }

    message AzureContentSafety {
      // The Azure Content Safety endpoint URL (e.g., "https://<resource-name>.cognitiveservices.azure.com")
      string endpoint = 1;

      // Severity threshold (0-6). Content at or above this level is blocked. Default: 2.
      optional int32 severity_threshold = 2;

      // API version to use (default: "2024-09-01")
      optional string api_version = 3;

      // Blocklist names to check against
      repeated string blocklist_names = 4;

      // When true, further analysis stops if a blocklist is hit
      optional bool halt_on_blocklist_hit = 5;

      repeated BackendPolicySpec inline_policies = 6;

      // Not yet implemented. Reserved for a future release.
      BackendReference backend_ref = 7;
    }

    // Response sent when rejecting a request
    message RequestRejection {
      bytes body = 1;
      uint32 status = 2;
    }

    // Configuration for guarding/processing LLM responses
    message ResponseGuard {
      // Response to send when response is rejected
      RequestRejection rejection = 1;
      oneof kind {
        RegexRules regex = 2;
        Webhook webhook = 3;
        GoogleModelArmor google_model_armor = 4;
        BedrockGuardrails bedrock_guardrails = 5;
        AzureContentSafety azure_content_safety = 6;
      }
    }

    // Configuration for guarding/processing prompts
    message RequestGuard {
      // Response to send when request is rejected
      RequestRejection rejection = 1;
      oneof kind {
        RegexRules regex = 2;
        Webhook webhook = 3;
        Moderation openai_moderation = 4;
        GoogleModelArmor google_model_armor = 5;
        BedrockGuardrails bedrock_guardrails = 6;
        AzureContentSafety azure_content_safety = 7;
      }
    }

    message PromptGuard {
      enum Streaming {
        DISABLED = 0;
        ENABLED = 1;
      }

      // Guards applied to client requests before they reach the LLM
      repeated RequestGuard request = 1;
      // Guards applied to LLM responses before they reach the client
      repeated ResponseGuard response = 2;
      // Apply guardrails to streaming responses and realtime websocket messages.
      // Defaults to disabled to preserve streaming throughput unless explicitly enabled.
      Streaming streaming = 3;
    }

    PromptGuard prompt_guard = 1;
    // Default JSON key-value pairs to add to the LLM request if the key is not set in the request.
    message PromptCaching {
      bool cache_system = 1;
      bool cache_messages = 2;
      bool cache_tools = 3;
      optional uint32 min_tokens = 4;
      optional uint32 cache_message_offset = 5;
    }

    map<string, string> defaults = 2;
    // Override JSON key-value pairs to set in the LLM request regardless of whether they are set in the request.
    map<string, string> overrides = 3;
    // CEL transformation expressions to evaluate and set in the LLM request.
    // Expressions are evaluated against the current request body and behave like overrides.
    map<string, string> transformations = 8;
    PromptEnrichment prompts = 4;
    // Model aliases - map from alias name to actual model name
    map<string, string> model_aliases = 5;
    PromptCaching prompt_caching = 6;

    // RouteType specifies how incoming requests should be processed
    // based on the URL path.
    enum RouteType {
      // Unspecified defaults to COMPLETIONS
      UNSPECIFIED = 0;
      // Processes OpenAI /v1/chat/completions format requests
      COMPLETIONS = 1;
      // Processes Anthropic /v1/messages format requests
      MESSAGES = 2;
      // Handles /v1/models endpoint (returns available models)
      MODELS = 3;
      // Sends requests to upstream as-is without LLM processing
      PASSTHROUGH = 4;
      // Sends requests upstream as-is but attempts to detect usage/metadata for telemetry/rate limiting
      DETECT = 9;
      // Processes OpenAI /responses format requests
      RESPONSES = 5;
      // Processes Anthropic /v1/messages/count_tokens format requests
      ANTHROPIC_TOKEN_COUNT = 6;
      // Processes OpenAI /v1/embeddings format requests
      EMBEDDINGS = 7;
      // OpenAI /v1/realtime
      REALTIME = 8;
      // Processes Cohere /v2/rerank format requests
      RERANK = 10;
    }

    // Routes defines how to identify the type of LLM request to handle.
    // The keys are URL suffix matches (e.g., "/v1/chat/completions", "/v1/messages").
    // The special "*" wildcard matches any path.
    // If empty or no route matches, the implementation defaults to COMPLETIONS behavior.
    map<string, RouteType> routes = 7;
  }
  message A2a {}
  message InferenceRouting {
    enum FailureMode {
      UNKNOWN = 0;
      FAIL_CLOSED = 1;
      FAIL_OPEN = 2;
    }
    BackendReference endpoint_picker = 1;
    FailureMode failure_mode = 2;
  }
  message Eviction {
    // Base time to evict (e.g. 3s, 10s). The actual ejection time equals
    // base * times_ejected, growing without cap via multiplicative backoff.
    // If all endpoints are evicted, the loadbalancer falls back to returning
    // evicted endpoints rather than failing entirely.
    google.protobuf.Duration duration = 1;

    reserved 2;
    reserved "max_eviction_time";

    // Health score (0.0–1.0) to assign to a backend when it returns from eviction.
    // For example, 0.5 brings the backend back at half-health so it recovers gradually,
    // while 1.0 restores it to full health immediately.
    // When unset, the health score is left unchanged on recovery (i.e. the backend
    // returns at whatever score it had when it was evicted).
    optional double restore_health = 3;

    reserved 4;
    reserved "max_eviction_percent";

    // Number of consecutive unhealthy responses required before evicting the backend.
    // For example, 3 means the backend must fail 3 times in a row before being evicted.
    // When both consecutive_failures and health_threshold are set, eviction triggers when
    // either condition is met. When neither is set, a single unhealthy response triggers eviction.
    optional int32 consecutive_failures = 5;

    // EWMA health score threshold (0.0–1.0) below which an unhealthy backend is evicted.
    // When set, the backend is only evicted if its exponentially-weighted moving average health
    // score drops below this value. Unlike consecutive_failures (which counts consecutive failures),
    // this uses a sliding-window average so a single success can delay eviction.
    // When both health_threshold and consecutive_failures are set, eviction triggers when
    // either condition is met. When neither is set, a single unhealthy response triggers eviction.
    optional double health_threshold = 6;
  }
  message Health {
    // cel expression evaluated per request to determine if eviction should be triggered
    // `true`: treat this response as **unhealthy** (candidate for eviction).
    // `false`: treat as healthy (no eviction from this response alone).
    // When empty, any 5xx response, or a connection failure, is treated as unhealthy.
    // This default lowers the backend's health score but does not trigger eviction on its own.
    string unhealthy_condition = 1;
    Eviction eviction = 2;
  }
  message BackendTLS {
    enum VerificationMode {
      STRICT = 0;
      INSECURE_HOST = 1;
      INSECURE_ALL = 2;
    }
    optional bytes cert = 1;
    optional bytes key = 2;
    // Root to verify. If not set, system certs will be used.
    // If no verification is desired, use 'insecure'
    optional bytes root = 3;
    VerificationMode verification = 4;
    // If set, override the SNI explicitly. Otherwise, it is auto-derived.
    optional string hostname = 5;
    // If set, the request must come from one of these hostnames. Otherwise, the destination
    // is used.
    repeated string verify_subject_alt_names = 6;
    // Unset: use defaults (h2,http/1.1)
    // Set but empty: send none
    // Set with values: send those values
    Alpn alpn = 7;
    // Key exchange groups allowed for negotiating TLS.
    // If empty, defaults are used.
    repeated TLSConfig.KeyExchangeGroup key_exchange_groups = 8;
  }
  message BackendHTTP {
    enum HttpVersion {
      UNSPECIFIED = 0;
      HTTP1 = 1;
      HTTP2 = 2;
    }
    HttpVersion version = 1;
    google.protobuf.Duration request_timeout = 2;
  }
  message BackendTunnel {
    BackendReference proxy = 1;
  }
  message BackendTCP {
    KeepaliveConfig keepalive = 1;
    google.protobuf.Duration connect_timeout = 2;
  }
  message McpAuthorization {
    repeated string allow = 1;
    repeated string deny = 2;
    repeated string require = 3;
  }

  message McpAuthentication {
    message ResourceMetadata {
      map<string, google.protobuf.Value> extra = 1;
    }

    enum McpIDP {
      UNSPECIFIED = 0;
      AUTH0 = 1;
      KEYCLOAK = 2;
      OKTA = 3;
    }

    // Validation mode for JWT authentication
    enum Mode {
      // if a token exists, validate it
      OPTIONAL = 0;
      // A valid token must be present
      STRICT = 1;
      // Requests are never rejected (useful for claims in later steps)
      PERMISSIVE = 2;
    }

    string issuer = 1;
    repeated string audiences = 2;
    string jwks_inline = 3;
    McpIDP provider = 4;
    ResourceMetadata resource_metadata = 5;
    // How the JWT validation should behave
    Mode mode = 6;
    // JWT validation options controlling which claims must be present.
    JWTValidationOptions jwt_validation_options = 7;
    AuthorizationLocation authorization_location = 8;
    optional string client_id = 9;
  }

  // McpGuardrails is a backend-phase policy for MCP traffic: an ordered chain of
  // policy processors. Today only the `remote` processor is defined — a custom
  // gRPC policy server (the ExtMcp service) modeled on Envoy ext_authz.
  message McpGuardrails {
    // Phase controls whether the request side, response side, or both of a
    // method are run through the guardrails pipeline.
    enum Phase {
      OFF = 0;
      REQUEST = 1;
      RESPONSE = 2;
      FULL = 3;
    }

    enum FailureMode {
      DENY = 0;
      ALLOW = 1;
    }

    // Configuration for the custom gRPC policy server. TLS, retries, and
    // load balancing to the policy server come from the backend referenced
    // by `target` (same pattern as TrafficPolicySpec.ExternalAuth).
    message Remote {
      BackendReference target = 1;
      FailureMode failure_mode = 2;
      // Static or CEL-evaluated context, surfaced to the policy server as
      // fields of the `metadata_context` google.protobuf.Struct, keyed by
      // config key.
      map<string, string> metadata = 3;
      // Request headers forwarded to the policy server in `McpRequest.headers`.
      // Empty means send all headers (modeled on Envoy ext_authz gRPC). When
      // non-empty, only listed header names are sent. Matching is
      // case-insensitive.
      repeated string allowed_request_headers = 4;
      // Header names never forwarded to the policy server, even if they appear
      // in `allowed_request_headers`. Case-insensitive.
      repeated string disallowed_request_headers = 5;
    }

    // Processor is a single policy processor. Today only `remote` is defined.
    message Processor {
      oneof kind {
        Remote remote = 1;
      }

      // Allowlist of JSON-RPC methods (e.g. "tools/call", "tools/list") that run
      // through this processor, keyed by method name with the phase it runs in.
      // Keys may be exact, prefix ("tools/*") or suffix ("*/list") wildcards, or
      // "*" for all methods; the most specific match wins when a method would match
      // multiple entries.
      map<string, Phase> methods = 2;
    }

    // Ordered list of processors applied to matched methods. Processors run in
    // the order listed; the first to reject a request short-circuits the chain.
    repeated Processor processors = 3;

    reserved 1, 2;
    reserved "remote", "methods";
  }

  oneof kind {
    A2a a2a = 1;
    InferenceRouting inference_routing = 2;
    BackendTLS backend_tls = 3;
    BackendAuthPolicy auth = 4;
    McpAuthorization mcp_authorization = 5;
    McpAuthentication mcp_authentication = 6;
    Ai ai = 7;
    HeaderModifier request_header_modifier = 8;
    HeaderModifier response_header_modifier = 9;
    RequestRedirect request_redirect = 10;
    RequestMirrors request_mirror = 11;
    BackendHTTP backend_http = 12;
    BackendTCP backend_tcp = 13;
    TrafficPolicySpec.TransformationPolicy transformation = 14;
    Health health = 15;
    BackendTunnel backend_tunnel = 16;
    TrafficPolicySpec.ExternalAuth ext_authz = 17;
    McpGuardrails mcp_guardrails = 18;
  }
}

message StaticBackend {
  string host = 1;
  int32 port = 2;
  string unix_path = 3;
}

message DynamicForwardProxy {}

message AwsBackend {
  oneof service {
    AwsAgentCoreBackend agent_core = 1;
  }
}

message AwsAgentCoreBackend {
  string agent_runtime_arn = 1;
  optional string qualifier = 2;
}

message AIBackend {
  message HostOverride {
    string host = 1;
    int32 port = 2;
  }
  message OpenAI {
    optional string model = 1;
  }
  message Gemini {
    optional string model = 1;
  }
  message Vertex {
    optional string model = 1;
    string region = 2;
    string project_id = 3;
  }
  message Anthropic {
    optional string model = 1;
  }
  message Bedrock {
    optional string model = 1;
    string region = 2;
    optional string guardrail_identifier = 3;
    optional string guardrail_version = 4;
  }
  message AzureOpenAI {
    optional string model = 1;
    string host = 2;
    optional string api_version = 3;
    optional string project_name = 4;
  }
  // Azure provider with explicit resource-based configuration.
  // Supports both Azure OpenAI and Azure AI Foundry resource types.
  message Azure {
    // The Azure resource name used to construct the endpoint host.
    string resource_name = 1;
    // The type of Azure endpoint.
    AzureResourceType resource_type = 2;
    // Optional model name override.
    optional string model = 3;
    // Optional Azure API version. Defaults to "v1" if not set.
    optional string api_version = 4;
    // Foundry project name, required when resource_type is FOUNDRY.
    optional string project_name = 5;
  }
  enum AzureResourceType {
    OPEN_AI = 0;
    FOUNDRY = 1;
  }
  enum ProviderFormat {
    PROVIDER_FORMAT_UNSPECIFIED = 0;
    COMPLETIONS = 1;
    MESSAGES = 2;
    RESPONSES = 3;
    EMBEDDINGS = 4;
    ANTHROPIC_TOKEN_COUNT = 5;
    REALTIME = 6;
    RERANK = 7;
  }
  message ProviderFormatConfig {
    ProviderFormat format = 1;
    optional string path = 2;
  }
  message Custom {
    repeated ProviderFormatConfig formats = 1;
    optional string model = 2;
    optional string provider_override = 3;
  }

  message Provider {
    string name = 1;
    HostOverride host_override = 2;
    optional string path_override = 3;
    optional string path_prefix = 12;
    BackendReference provider_backend = 14;
    oneof provider {
      OpenAI openai = 4;
      Gemini gemini = 5;
      Vertex vertex = 6;
      Anthropic anthropic = 7;
      Bedrock bedrock = 8;
      AzureOpenAI azureopenai = 11;
      Azure azure = 13;
      Custom custom = 15;
    }
    repeated BackendPolicySpec inline_policies = 10;
  }
  message ProviderGroup {
    repeated Provider providers = 1;
  }
  repeated ProviderGroup provider_groups = 1;
}

message MCPBackend {
  enum StatefulMode {
    STATEFUL = 0;
    STATELESS = 1;
  }

  enum PrefixMode {
    CONDITIONAL = 0;
    ALWAYS = 1;
  }

  repeated MCPTarget targets = 2;
  // Whether or not this backend should serve stateful MCP connections.
  // We set this at the backend level because it would be illegal/nonsensical
  // to mix stateful and stateless targets in the same backend.
  StatefulMode stateful_mode = 3;
  // Whether to always prefix the tool name using the target name
  PrefixMode prefix_mode = 4;

  // failure_mode controls behavior when MCP targets fail to initialize or
  // become unavailable at runtime. Defaults to FAIL_CLOSED.
  enum FailureMode {
    FAIL_CLOSED = 0;
    FAIL_OPEN = 1;
  }
  FailureMode failure_mode = 5;
}

message MCPTarget {
  enum Protocol {
    UNDEFINED = 0;
    SSE = 1;
    STREAMABLE_HTTP = 2;
  }
  string name = 1;
  BackendReference backend = 2;
  string path = 3;
  Protocol protocol = 4;
}

message BackendReference {
  message Service {
    string namespace = 1;
    string hostname = 2;
  }
  oneof kind {
    Service service = 1;
    // A Backend object. The format is "<backend key>"
    string backend = 2;
  }
  // Port, used only with 'service' type
  uint32 port = 3;
}

message Alpn {
  repeated string protocols = 1;
}

// RFC 8693 OAuth 2.0 Token Exchange.
message OAuthTokenExchange {
  message ClientAuth {
    string client_id = 1;
  }
  BackendReference token_endpoint = 1;
  // Token endpoint path on the backend; defaults to "/".
  string token_endpoint_path = 7;
  // Optional RFC 8693 request parameters; sent only when non-empty.
  repeated string audiences = 2;
  repeated string scopes = 3;
  repeated string resources = 4;
  string requested_token_type = 5;
  ClientAuth client_auth = 6;
}
