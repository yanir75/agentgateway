apiVersion: agentgateway.dev/v1alpha1
kind: AgentgatewayPolicy
metadata:
  name: traffic-gateway-phase
spec:
  targetRefs:
    - group: gateway.networking.k8s.io
      kind: Gateway
      name: dummy
  traffic:
    phase: PreRouting
    transformation:
      request:
        set:
          - name: X-Gateway
            value: '"true"'
---
apiVersion: agentgateway.dev/v1alpha1
kind: AgentgatewayPolicy
metadata:
  name: traffic-route-phase
spec:
  targetRefs:
    - group: gateway.networking.k8s.io
      kind: Gateway
      name: dummy
  traffic:
    phase: PostRouting
    transformation:
      request:
        set:
          - name: X-Route
            value: '"true"'
---
apiVersion: agentgateway.dev/v1alpha1
kind: AgentgatewayPolicy
metadata:
  name: backend-combined
spec:
  targetRefs:
    - group: gateway.networking.k8s.io
      kind: Gateway
      name: dummy
  backend:
    tcp:
      keepalive:
        retries: 3
        time: 30s
        interval: 10s
      connectTimeout: 3s
    tls:
      sni: backend.example.com
      alpnProtocols:
        - h2
    auth:
      secretRef:
        name: backend-token
---
apiVersion: agentgateway.dev/v1alpha1
kind: AgentgatewayPolicy
metadata:
  name: frontend-combined
spec:
  targetRefs:
    - group: gateway.networking.k8s.io
      kind: Gateway
      name: dummy
  frontend:
    tcp:
      keepalive:
        retries: 5
        time: 60s
        interval: 30s
    tls:
      handshakeTimeout: 15s
    http:
      maxBufferSize: 2097152
      http1MaxHeaders: 100
      http1IdleTimeout: 10m
      http2WindowSize: 65536
      http2ConnectionWindowSize: 131072
---
apiVersion: agentgateway.dev/v1alpha1
kind: AgentgatewayPolicy
metadata:
  name: traffic-complex
spec:
  targetRefs:
    - group: gateway.networking.k8s.io
      kind: Gateway
      name: dummy
  traffic:
    transformation:
      request:
        set:
          - name: X-Forwarded-Proto
            value: '"https"'
      response:
        add:
          - name: X-Response-Time
            value: 'string(duration.milliseconds)'
    extAuth:
      backendRef:
        name: auth-server
        kind: Service
        port: 8888
      grpc: {}
    rateLimit:
      local:
        - requests: 100
          unit: Minutes
          burst: 10
    cors:
      allowOrigins:
        - "*"
      allowMethods:
        - GET
        - POST
      maxAge: 600
    timeouts:
      request: 30s
  frontend:
    accessLog:
      filter: 'true'
---
apiVersion: agentgateway.dev/v1alpha1
kind: AgentgatewayPolicy
metadata:
  name: traffic-multi-ratelimit
spec:
  targetRefs:
    - group: gateway.networking.k8s.io
      kind: Gateway
      name: dummy
  traffic:
    rateLimit:
      local:
        - requests: 1000
          unit: Hours
        - requests: 100
          unit: Minutes
        - requests: 10
          unit: Seconds
          burst: 5
---
apiVersion: agentgateway.dev/v1alpha1
kind: AgentgatewayPolicy
metadata:
  name: frontend-proxy
spec:
  targetRefs:
    - group: gateway.networking.k8s.io
      kind: Gateway
      name: dummy
  frontend:
    proxyProtocol:
      version: All
      mode: Optional
---
apiVersion: agentgateway.dev/v1alpha1
kind: AgentgatewayPolicy
metadata:
  name: ext-auth-conditional
spec:
  targetRefs:
    - group: gateway.networking.k8s.io
      kind: Gateway
      name: dummy
  traffic:
    extAuth:
      conditional:
        - condition: "random() > .5"
          policy:
            backendRef:
              name: foo
              port: 1234
            grpc: {}
---
apiVersion: agentgateway.dev/v1alpha1
kind: AgentgatewayPolicy
metadata:
  name: ext-auth-conditional-fallback
spec:
  targetRefs:
    - group: gateway.networking.k8s.io
      kind: Gateway
      name: dummy
  traffic:
    extAuth:
      conditional:
        - condition: '"x-test" in request.headers'
          policy:
            backendRef:
              name: foo
              port: 1234
            grpc: {}
        - policy:
            backendRef:
              name: fallback
              port: 1234
            grpc: {}
---
apiVersion: agentgateway.dev/v1alpha1
kind: AgentgatewayPolicy
metadata:
  name: transformation-conditional
spec:
  targetRefs:
    - group: gateway.networking.k8s.io
      kind: Gateway
      name: dummy
  traffic:
    transformation:
      conditional:
        - condition: "request.path == '/transform'"
          policy:
            request:
              set:
                - name: x-test
                  value: "'transform'"
---
apiVersion: agentgateway.dev/v1alpha1
kind: AgentgatewayPolicy
metadata:
  name: transformation-conditional-fallback
spec:
  targetRefs:
    - group: gateway.networking.k8s.io
      kind: Gateway
      name: dummy
  traffic:
    transformation:
      conditional:
        - condition: "request.path == '/transform'"
          policy:
            request:
              set:
                - name: x-test
                  value: "'transform'"
        - policy:
            response:
              add:
                - name: x-fallback
                  value: "'true'"
---
apiVersion: agentgateway.dev/v1alpha1
kind: AgentgatewayPolicy
metadata:
  name: ext-proc-conditional
spec:
  targetRefs:
    - group: gateway.networking.k8s.io
      kind: Gateway
      name: dummy
  traffic:
    extProc:
      conditional:
        - condition: "request.path == '/process'"
          policy:
            backendRef:
              name: processor
              port: 1234
---
apiVersion: agentgateway.dev/v1alpha1
kind: AgentgatewayPolicy
metadata:
  name: ext-proc-conditional-fallback
spec:
  targetRefs:
    - group: gateway.networking.k8s.io
      kind: Gateway
      name: dummy
  traffic:
    extProc:
      conditional:
        - condition: "request.path == '/process'"
          policy:
            backendRef:
              name: processor
              port: 1234
        - policy:
            backendRef:
              name: fallback-processor
              port: 1234
---
apiVersion: agentgateway.dev/v1alpha1
kind: AgentgatewayPolicy
metadata:
  name: rate-limit-conditional
spec:
  targetRefs:
    - group: gateway.networking.k8s.io
      kind: Gateway
      name: dummy
  traffic:
    rateLimit:
      conditional:
        - condition: "request.path == '/limited'"
          policy:
            local:
              - requests: 10
                unit: Seconds
---
apiVersion: agentgateway.dev/v1alpha1
kind: AgentgatewayPolicy
metadata:
  name: rate-limit-conditional-fallback
spec:
  targetRefs:
    - group: gateway.networking.k8s.io
      kind: Gateway
      name: dummy
  traffic:
    rateLimit:
      conditional:
        - condition: "request.path == '/limited'"
          policy:
            local:
              - requests: 10
                unit: Seconds
        - policy:
            local:
              - requests: 1
                unit: Minutes
---
apiVersion: agentgateway.dev/v1alpha1
kind: AgentgatewayPolicy
metadata:
  name: buffer-request-and-response
spec:
  targetRefs:
    - group: gateway.networking.k8s.io
      kind: HTTPRoute
      name: dummy
  traffic:
    buffer:
      request:
        maxBytes: 10Mi
      response:
        maxBytes: 5Mi
---
apiVersion: agentgateway.dev/v1alpha1
kind: AgentgatewayPolicy
metadata:
  name: buffer-request-body
spec:
  targetRefs:
    - group: gateway.networking.k8s.io
      kind: HTTPRoute
      name: dummy
  traffic:
    buffer:
      request:
        maxBytes: 10Mi
        onOverflow: "ReturnError"
---
apiVersion: agentgateway.dev/v1alpha1
kind: AgentgatewayPolicy
metadata:
  name: buffer-response-body
spec:
  targetRefs:
    - group: gateway.networking.k8s.io
      kind: HTTPRoute
      name: dummy
  traffic:
    buffer:
      response:
        maxBytes: 5Mi
        onOverflow: "ContinueStreaming"
---
apiVersion: agentgateway.dev/v1alpha1
kind: AgentgatewayPolicy
metadata:
  name: buffer-response-body
spec:
  targetRefs:
    - group: gateway.networking.k8s.io
      kind: HTTPRoute
      name: dummy
  traffic:
    buffer:
      request: {}
      response: {}
---
apiVersion: agentgateway.dev/v1alpha1
kind: AgentgatewayPolicy
metadata:
  name: buffer-response-body
spec:
  targetRefs:
    - group: gateway.networking.k8s.io
      kind: GRPCRoute
      name: dummy
  traffic:
    buffer:
      request: {}
      response: {}
---
apiVersion: agentgateway.dev/v1alpha1
kind: AgentgatewayPolicy
metadata:
  name: direct-response-conditional
spec:
  targetRefs:
    - group: gateway.networking.k8s.io
      kind: Gateway
      name: dummy
  traffic:
    directResponse:
      conditional:
        - condition: "request.path == '/blocked'"
          policy:
            status: 403
            body: denied
            headers:
              - name: x-direct
                value: "'blocked'"
---
apiVersion: agentgateway.dev/v1alpha1
kind: AgentgatewayPolicy
metadata:
  name: direct-response-conditional-fallback
spec:
  targetRefs:
    - group: gateway.networking.k8s.io
      kind: Gateway
      name: dummy
  traffic:
    directResponse:
      conditional:
        - condition: "request.path == '/blocked'"
          policy:
            status: 403
            body: denied
        - policy:
            status: 404
            bodyExpression: "'missing ' + request.path"
---
apiVersion: agentgateway.dev/v1alpha1
kind: AgentgatewayPolicy
metadata:
  name: jwt-auth-expression-location
spec:
  targetRefs:
    - group: gateway.networking.k8s.io
      kind: HTTPRoute
      name: dummy
  traffic:
    jwtAuthentication:
      location:
        expression: 'request.headers["x-jwt-token"]'
      providers:
        - issuer: solo.io
          jwks:
            inline: '{"keys":[]}'
---
apiVersion: agentgateway.dev/v1alpha1
kind: AgentgatewayPolicy
metadata:
  name: api-key-auth-expression-location
spec:
  targetRefs:
    - group: gateway.networking.k8s.io
      kind: HTTPRoute
      name: dummy
  traffic:
    apiKeyAuthentication:
      location:
        expression: 'request.headers["x-api-key"]'
      secretRef:
        name: api-keys
---
apiVersion: agentgateway.dev/v1alpha1
kind: AgentgatewayPolicy
metadata:
  name: basic-auth-expression-location
spec:
  targetRefs:
    - group: gateway.networking.k8s.io
      kind: HTTPRoute
      name: dummy
  traffic:
    basicAuthentication:
      location:
        expression: 'request.headers["authorization"]'
      secretRef:
        name: basic-users
---
apiVersion: agentgateway.dev/v1alpha1
kind: AgentgatewayPolicy
metadata:
  name: backend-auth-credential-ref-explicit-secret
spec:
  targetRefs:
    - group: gateway.networking.k8s.io
      kind: Gateway
      name: dummy
  backend:
    auth:
      secretRef:
        name: api-key-secret
        group: ""
        kind: Secret
---
apiVersion: agentgateway.dev/v1alpha1
kind: AgentgatewayPolicy
metadata:
  name: backend-auth-credential-ref-empty-secret-kind
